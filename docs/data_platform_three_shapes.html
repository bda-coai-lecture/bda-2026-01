<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>데이터 플랫폼의 세 가지 형태</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2f5;
        --paper: #ffffff;
        --ink: #172033;
        --muted: #64748b;
        --line: #d6dee8;
        --soft: #f4f7fa;
        --raw: #475569;
        --bq: #2563eb;
        --model: #0f766e;
        --quality: #b45309;
        --auto: #6d28d9;
        --bi: #15803d;
        --ops: #b91c1c;
      }

      * {
        box-sizing: border-box;
        min-width: 0;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        letter-spacing: 0;
      }

      .deck {
        width: min(1440px, calc(100% - 28px));
        margin: 0 auto;
        padding: 22px 0 72px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 0;
        background: linear-gradient(var(--bg) 72%, rgb(238 242 245 / 0));
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: var(--model);
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        display: inline-grid;
        place-items: center;
        width: 38px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
      }

      button:hover {
        border-color: var(--model);
      }

      .counter {
        min-width: 96px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      .slide {
        display: grid;
        min-height: 760px;
        margin: 18px 0 34px;
        padding: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: 0 18px 42px rgb(15 23 42 / 0.08);
        scroll-margin-top: 74px;
      }

      .slide.title {
        grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
        gap: 34px;
        align-items: center;
        align-content: center;
      }

      .slide.split {
        grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
        gap: 34px;
      }

      .slide.center {
        place-items: center;
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--model);
        font-size: 13px;
        font-weight: 850;
        text-transform: uppercase;
      }

      h1,
      h2 {
        margin: 0;
        line-height: 1.05;
        font-weight: 900;
      }

      h1 {
        font-size: clamp(52px, 7vw, 96px);
      }

      h2 {
        font-size: clamp(36px, 4.6vw, 68px);
      }

      .subtitle {
        max-width: 900px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 23px;
        line-height: 1.45;
      }

      .number {
        color: var(--model);
        font-size: clamp(88px, 13vw, 170px);
        line-height: 0.9;
        font-weight: 950;
      }

      .tagline {
        margin-top: 24px;
        padding: 18px 20px;
        border-left: 5px solid var(--model);
        border-radius: 8px;
        background: #f0fdfa;
        font-size: 22px;
        font-weight: 800;
      }

      .bullets {
        display: grid;
        gap: 15px;
        margin: 28px 0 0;
        padding: 0;
        list-style: none;
      }

      .bullets li {
        position: relative;
        padding-left: 28px;
        color: var(--ink);
        font-size: 24px;
        line-height: 1.42;
      }

      .bullets li::before {
        content: "";
        position: absolute;
        top: 0.76em;
        left: 0;
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: var(--model);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 28px;
      }

      .card {
        min-height: 136px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
      }

      .card strong {
        display: block;
        margin-bottom: 8px;
        font-size: 19px;
      }

      .card span {
        color: var(--muted);
        font-size: 16px;
      }

      .flow {
        display: grid;
        gap: 14px;
        margin-top: 26px;
      }

      .flow-row {
        display: grid;
        grid-template-columns: 128px minmax(0, 1fr) 92px;
        align-items: stretch;
        gap: 12px;
      }

      .flow-tag,
      .flow-out {
        display: grid;
        place-items: center;
        border-radius: 8px;
        color: #fff;
        font-weight: 850;
        text-align: center;
      }

      .flow-tag.raw { background: var(--raw); }
      .flow-tag.model { background: var(--model); }
      .flow-tag.bq { background: var(--bq); }
      .flow-tag.auto { background: var(--auto); }
      .flow-out { background: #334155; }

      .flow-box {
        padding: 17px 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .flow-box strong {
        display: block;
        margin-bottom: 4px;
        font-size: 18px;
      }

      .flow-box span {
        color: var(--muted);
        font-size: 15px;
      }

      .map {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 28px;
      }

      .map-step {
        min-height: 126px;
        padding: 17px;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .map-step b {
        display: block;
        margin-bottom: 8px;
        font-size: 19px;
      }

      .map-step span {
        color: var(--muted);
        font-size: 16px;
      }

      .raw { border-color: var(--raw); }
      .bq { border-color: var(--bq); }
      .model { border-color: var(--model); }
      .quality { border-color: var(--quality); }
      .auto { border-color: var(--auto); }
      .bi { border-color: var(--bi); }
      .ops { border-color: var(--ops); }

      .matrix {
        width: 100%;
        margin-top: 28px;
        border-collapse: collapse;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 18px;
      }

      .matrix th,
      .matrix td {
        padding: 13px 15px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .matrix th {
        background: var(--soft);
        font-weight: 850;
      }

      .matrix tr:last-child td {
        border-bottom: 0;
      }

      .codebox {
        margin: 26px 0 0;
        padding: 18px 20px;
        border-radius: 8px;
        background: #111827;
        color: #f9fafb;
        font-size: 18px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .path {
        margin-top: 22px;
        padding: 14px 16px;
        border-radius: 8px;
        background: #f8fafc;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 16px;
        overflow-wrap: anywhere;
      }

      .note {
        margin: 24px 0 0;
        padding: 15px 18px;
        border-left: 5px solid var(--quality);
        border-radius: 8px;
        background: #fffbeb;
        color: #78350f;
        font-size: 18px;
        font-weight: 650;
      }

      .visual-panel {
        margin-top: 28px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      .visual-title {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .visual-panel svg {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (max-width: 900px) {
        .slide,
        .slide.title,
        .slide.split {
          grid-template-columns: 1fr;
          min-height: auto;
          padding: 28px;
        }

        .cards,
        .map {
          grid-template-columns: 1fr;
        }

        .bullets li {
          font-size: 20px;
        }
      }

      @media print {
        body {
          background: #fff;
        }

        .topbar {
          display: none;
        }

        .deck {
          width: 100%;
          padding: 0;
        }

        .slide {
          min-height: 100vh;
          margin: 0;
          border: 0;
          border-radius: 0;
          box-shadow: none;
          break-after: page;
        }
      }
    </style>
  </head>

      function el(name, className, text) {
        const node = document.createElement(name);
        if (className) node.className = className;
        if (text !== undefined) node.textContent = text;
        return node;
      }

      function addBullets(parent, bullets) {
        if (!bullets) return;
        const ul = el("ul", "bullets");
        bullets.forEach((item) => ul.appendChild(el("li", "", item)));
        parent.appendChild(ul);
      }

      function addCards(parent, cards) {
        if (!cards) return;
        const wrap = el("div", "cards");
        cards.forEach(([title, body]) => {
          const card = el("div", "card");
          card.appendChild(el("strong", "", title));
          card.appendChild(el("span", "", body));
          wrap.appendChild(card);
        });
        parent.appendChild(wrap);
      }

      function addFlow(parent, rows) {
        if (!rows) return;
        const wrap = el("div", "flow");
        rows.forEach(([kind, tag, title, body, out = "핵심"]) => {
          const row = el("div", "flow-row");
          row.appendChild(el("div", `flow-tag ${kind}`, tag));
          const box = el("div", "flow-box");
          box.appendChild(el("strong", "", title));
          box.appendChild(el("span", "", body));
          row.appendChild(box);
          row.appendChild(el("div", "flow-out", out));
          wrap.appendChild(row);
        });
        parent.appendChild(wrap);
      }

      function addMap(parent, items) {
        if (!items) return;
        const wrap = el("div", "map");
        items.forEach(([kind, title, body]) => {
          const step = el("div", `map-step ${kind}`);
          step.appendChild(el("b", "", title));
          step.appendChild(el("span", "", body));
          wrap.appendChild(step);
        });
        parent.appendChild(wrap);
      }

        const table = el("table", "matrix");
        const [head, ...bodyRows] = rows;
        const thead = document.createElement("thead");
        const trh = document.createElement("tr");
        head.forEach((cell) => trh.appendChild(el("th", "", cell)));
        thead.appendChild(trh);
        table.appendChild(thead);
        const tbody = document.createElement("tbody");
        bodyRows.forEach((row) => {
          const tr = document.createElement("tr");
          row.forEach((cell) => tr.appendChild(el("td", "", cell)));
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        parent.appendChild(table);
      }

 font-size="15" font-weight="900" fill="#172033">cost</text><text x="28" y="60" text-anchor="middle" font-size="11" fill="#64748b">guard</text></g><text x="490" y="248" text-anchor="middle" font-size="16" fill="#64748b">운영은 순서, 범위, 실패 처리, 비용 방어선까지 포함한다</text></svg>`
        };
        wrap.appendChild(el("p", "visual-title", titles[type]));
        wrap.insertAdjacentHTML("beforeend", svgs[type]);
        parent.appendChild(wrap);
      }

      function renderSlide(slide, index) {
        const article = el("article", `slide ${slide.layout || ""}`);
        article.id = `slide-${index + 1}`;

        const main = el("div");
        main.appendChild(el("p", "eyebrow", `${String(index + 1).padStart(2, "0")} · ${slide.section}`));
        main.appendChild(el(index === 0 ? "h1" : "h2", "", slide.title));
        if (slide.subtitle) main.appendChild(el("p", "subtitle", slide.subtitle));
        if (slide.tagline) main.appendChild(el("div", "tagline", slide.tagline));
        addBullets(main, slide.bullets);
        addVisual(main, slide.visual);
        addMap(main, slide.map);
        addTable(main, slide.table);
        addCards(main, slide.cards);
        if (slide.code) main.appendChild(el("pre", "codebox", slide.code));
        if (slide.path) main.appendChild(el("div", "path", slide.path));
        if (slide.note) main.appendChild(el("p", "note", slide.note));
        article.appendChild(main);

        if (slide.layout === "title") {
          const side = el("div");
          if (slide.titleFlow) {
            addFlow(side, slide.titleFlow);
          } else {
            side.appendChild(el("div", "number", String(slides.length)));
            side.appendChild(el("p", "subtitle", "slides"));
            side.appendChild(el("div", "tagline", "규모가 바뀌면 좋은 데이터 플랫폼의 모양도 바뀐다."));
          }
          article.appendChild(side);
        }
        return article;
      }

      slides.forEach((slide, index) => root.appendChild(renderSlide(slide, index)));
      counter.textContent = `1 / ${slides.length}`;

      function currentIndex() {
        const positions = slides.map((_, index) => {
          const node = document.getElementById(`slide-${index + 1}`);
          return Math.abs(node.getBoundingClientRect().top - 82);
        });
        return positions.indexOf(Math.min(...positions));
      }

      function go(delta) {
        const next = Math.max(0, Math.min(slides.length - 1, currentIndex() + delta));
        document.getElementById(`slide-${next + 1}`).scrollIntoView({ behavior: "smooth", block: "start" });
      }

      document.getElementById("prev").addEventListener("click", () => go(-1));
      document.getElementById("next").addEventListener("click", () => go(1));
      window.addEventListener("scroll", () => {
        counter.textContent = `${currentIndex() + 1} / ${slides.length}`;
      }, { passive: true });
      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight" || event.key === "PageDown") go(1);
        if (event.key === "ArrowLeft" || event.key === "PageUp") go(-1);
      });
    </script>
