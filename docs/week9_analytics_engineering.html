<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Week 9 Analytics Engineering</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2f5;
        --paper: #ffffff;
        --ink: #172033;
        --muted: #64748b;
        --line: #d6dee8;
        --soft: #f4f7fa;
        --raw: #475569;
        --collect: #2563eb;
        --model: #0f766e;
        --quality: #b45309;
        --auto: #7c3aed;
        --bi: #15803d;
        --ops: #b91c1c;
      }

      * {
        box-sizing: border-box;
        min-width: 0;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        letter-spacing: 0;
      }

      .deck {
        width: min(1440px, calc(100% - 28px));
        margin: 0 auto;
        padding: 22px 0 72px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 0;
        background: linear-gradient(var(--bg) 72%, rgb(238 242 245 / 0));
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: var(--model);
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        display: inline-grid;
        place-items: center;
        width: 38px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
      }

      button:hover {
        border-color: var(--model);
      }

      .counter {
        min-width: 96px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      .slide {
        display: grid;
        min-height: 760px;
        margin: 18px 0 34px;
        padding: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: 0 18px 42px rgb(15 23 42 / 0.08);
        scroll-margin-top: 74px;
      }

      .slide.title {
        grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
        gap: 34px;
        align-items: center;
      }

      .slide.split {
        grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
        gap: 34px;
      }

      .slide.center {
        place-items: center;
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--model);
        font-size: 13px;
        font-weight: 850;
        text-transform: uppercase;
      }

      h1,
      h2 {
        margin: 0;
        line-height: 1.05;
        font-weight: 900;
      }

      h1 {
        font-size: clamp(48px, 6vw, 86px);
      }

      h2 {
        font-size: clamp(36px, 4.6vw, 68px);
      }

      .subtitle {
        max-width: 850px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 23px;
        line-height: 1.45;
      }

      .section-label {
        width: max-content;
        max-width: 100%;
        margin-bottom: 14px;
        padding: 6px 11px;
        border-radius: 999px;
        background: #e7f6f2;
        color: var(--model);
        font-size: 13px;
        font-weight: 850;
      }

      .tagline {
        margin-top: 24px;
        padding: 18px 20px;
        border-left: 5px solid var(--model);
        border-radius: 8px;
        background: #f0fdfa;
        font-size: 22px;
        font-weight: 800;
      }

      .bullets {
        display: grid;
        gap: 15px;
        margin: 30px 0 0;
        padding: 0;
        list-style: none;
      }

      .bullets li {
        position: relative;
        padding-left: 30px;
        color: #334155;
        font-size: 24px;
      }

      .bullets li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 14px;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--model);
      }

      .note {
        margin-top: 26px;
        color: var(--muted);
        font-size: 17px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 28px;
      }

      .card {
        min-height: 148px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfe;
      }

      .card strong {
        display: block;
        margin-bottom: 8px;
        font-size: 18px;
      }

      .card span {
        display: block;
        color: var(--muted);
        font-size: 15px;
      }

      .map {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 30px;
      }

      .map-step {
        padding: 18px;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .map-step b {
        display: block;
        margin-bottom: 8px;
        font-size: 19px;
      }

      .map-step span {
        color: var(--muted);
        font-size: 15px;
      }

      .map-step.raw { border-color: var(--raw); }
      .map-step.collect { border-color: var(--collect); }
      .map-step.model { border-color: var(--model); }
      .map-step.quality { border-color: var(--quality); }
      .map-step.auto { border-color: var(--auto); }
      .map-step.bi { border-color: var(--bi); }
      .map-step.ops { border-color: var(--ops); }

      .codebox {
        margin-top: 28px;
        padding: 20px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #0f172a;
        color: #e2e8f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 16px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .path {
        display: inline-block;
        max-width: 100%;
        margin-top: 20px;
        padding: 8px 10px;
        border-radius: 7px;
        background: var(--soft);
        color: #334155;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 14px;
        overflow-wrap: anywhere;
      }

      .visual-panel {
        margin-top: 30px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      .visual-title {
        margin: 0 0 12px;
        color: #334155;
        font-size: 15px;
        font-weight: 850;
      }

      .visual-panel svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .visual-panel text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      .matrix {
        width: 100%;
        margin-top: 26px;
        border-collapse: collapse;
        font-size: 17px;
      }

      .matrix th,
      .matrix td {
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .matrix th {
        background: var(--soft);
        color: #334155;
      }

      .matrix td {
        color: var(--muted);
      }

      .number {
        color: var(--model);
        font-size: 86px;
        font-weight: 950;
        line-height: 1;
      }

      @media (max-width: 920px) {
        .slide,
        .slide.title,
        .slide.split {
          grid-template-columns: 1fr;
          min-height: auto;
          padding: 28px;
        }

        .cards,
        .map {
          grid-template-columns: 1fr;
        }

        .bullets li {
          font-size: 20px;
        }
      }

      @media print {
        body {
          background: #fff;
        }

        .topbar {
          display: none;
        }

        .deck {
          width: 100%;
          padding: 0;
        }

        .slide {
          min-height: 100vh;
          margin: 0;
          border: 0;
          border-radius: 0;
          box-shadow: none;
          break-after: page;
        }
      }
    </style>
  </head>

      function el(name, className, text) {
        const node = document.createElement(name);
        if (className) node.className = className;
        if (text !== undefined) node.textContent = text;
        return node;
      }

      function addBullets(parent, bullets) {
        if (!bullets) return;
        const ul = el("ul", "bullets");
        bullets.forEach((item) => ul.appendChild(el("li", "", item)));
        parent.appendChild(ul);
      }

      function addCards(parent, cards) {
        if (!cards) return;
        const wrap = el("div", "cards");
        cards.forEach(([title, body]) => {
          const card = el("div", "card");
          card.appendChild(el("strong", "", title));
          card.appendChild(el("span", "", body));
          wrap.appendChild(card);
        });
        parent.appendChild(wrap);
      }

      function addMap(parent, items) {
        if (!items) return;
        const wrap = el("div", "map");
        items.forEach(([kind, title, body]) => {
          const step = el("div", `map-step ${kind}`);
          step.appendChild(el("b", "", title));
          step.appendChild(el("span", "", body));
          wrap.appendChild(step);
        });
        parent.appendChild(wrap);
      }

      function addTable(parent, rows) {
        if (!rows) return;
        const table = el("table", "matrix");
        const [head, ...bodyRows] = rows;
        const thead = document.createElement("thead");
        const trh = document.createElement("tr");
        head.forEach((cell) => trh.appendChild(el("th", "", cell)));
        thead.appendChild(trh);
        table.appendChild(thead);
        const tbody = document.createElement("tbody");
        bodyRows.forEach((row) => {
          const tr = document.createElement("tr");
          row.forEach((cell) => tr.appendChild(el("td", "", cell)));
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        parent.appendChild(table);
      }

      function renderSlide(slide, index) {
        const article = el("article", `slide ${slide.layout || ""}`);
        article.id = `slide-${index + 1}`;

        const main = el("div");
        main.appendChild(el("p", "eyebrow", `${String(index + 1).padStart(2, "0")} · ${slide.section}`));
        main.appendChild(el(index === 0 ? "h1" : "h2", "", slide.title));
        if (slide.subtitle) main.appendChild(el("p", "subtitle", slide.subtitle));
        addBullets(main, slide.bullets);
        addVisual(main, slide.visual);
        addMap(main, slide.map);
        addTable(main, slide.table);
        addCards(main, slide.cards);
        if (slide.code) main.appendChild(el("pre", "codebox", slide.code));
        if (slide.path) main.appendChild(el("div", "path", slide.path));
        if (slide.note) main.appendChild(el("p", "note", slide.note));
        article.appendChild(main);

        if (slide.layout === "title") {
          const side = el("div");
          side.appendChild(el("div", "number", String(slides.length)));
          side.appendChild(el("p", "subtitle", "slides"));
          side.appendChild(el("div", "tagline", "회사에서 왜 필요한가를 먼저 보고, 그 필요가 기술 선택으로 이어지게 설명함."));
          article.appendChild(side);
        }
        return article;
      }

      slides.forEach((slide, index) => root.appendChild(renderSlide(slide, index)));
      counter.textContent = `1 / ${slides.length}`;

      function currentIndex() {
        const positions = slides.map((_, index) => {
          const node = document.getElementById(`slide-${index + 1}`);
          return Math.abs(node.getBoundingClientRect().top - 82);
        });
        return positions.indexOf(Math.min(...positions));
      }

      function go(delta) {
        const next = Math.max(0, Math.min(slides.length - 1, currentIndex() + delta));
        document.getElementById(`slide-${next + 1}`).scrollIntoView({ behavior: "smooth", block: "start" });
      }

      document.getElementById("prev").addEventListener("click", () => go(-1));
      document.getElementById("next").addEventListener("click", () => go(1));
      window.addEventListener("scroll", () => {
        counter.textContent = `${currentIndex() + 1} / ${slides.length}`;
      }, { passive: true });
      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight" || event.key === "PageDown") go(1);
        if (event.key === "ArrowLeft" || event.key === "PageUp") go(-1);
      });
