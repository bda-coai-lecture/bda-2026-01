name: gharchive_metrics
version: "1.0.0"
config-version: 2

profile: gharchive_metrics

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  source_dataset: mart
  raw_start_date: "2026-02-23"
  raw_end_date: "2026-05-23"

models:
  gharchive_metrics:
    raw:
      +materialized: view
      +tags: ["lineage_reference"]
    staging:
      +materialized: view
    marts:
      +materialized: table
