version: 2

models:
  - name: raw_githubarchive_events_90d
    description: >
      Reference view over GitHub Archive public raw event shards for the current
      90-day dashboard window. This exists to make the raw layer visible in dbt
      docs; the production fact table is still loaded by scripts/sync_bq_metrics.py.
    columns:
      - name: user_id
        description: GitHub actor id from actor.id.
      - name: repo_id
        description: GitHub repository id from repo.id.
      - name: action
        description: GitHub Archive event type.
      - name: activity_date
        description: Event date parsed from the sharded table suffix.

  - name: fact_user_repo_activity_from_raw_reference
    description: >
      Reference transformation showing how raw GitHub Archive events collapse
      into the user-repo-action-date grain used by mart.fact_user_repo_activity.
      It is a docs and education lineage reference only, not the production
      upstream consumed by dashboard marts.
    columns:
      - name: user_id
      - name: repo_id
      - name: action
      - name: event_count
      - name: activity_date
