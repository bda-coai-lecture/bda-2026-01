version: 2

models:
  - name: stg_user_repo_activity
    description: >
      Clean interface over the dbt-owned `fact_user_repo_activity` model for
      GitHub Archive actor-repo-action activity. The `user_id` column is the
      GitHub event actor id (`actor.id`), not an organization id. Organization
      context from GitHub Archive `org` is not currently modeled.
    columns:
      - name: user_id
        description: GitHub event actor id from `actor.id`; retained as `user_id` for compatibility, but semantically this is `actor_id`.
        tests:
          - not_null
      - name: repo_id
        tests:
          - not_null
      - name: action
        tests:
          - not_null
      - name: event_count
        tests:
          - not_null
      - name: activity_date
        tests:
          - not_null
      - name: week_start
        tests:
          - not_null
      - name: month_start
        tests:
          - not_null
