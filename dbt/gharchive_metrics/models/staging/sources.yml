version: 2

sources:
  - name: gharchive
    database: "{{ env_var('DBT_BIGQUERY_PROJECT', 'bda-coai') }}"
    schema: "{{ var('source_dataset', 'mart') }}"
    tables:
      - name: fact_user_repo_activity
        description: Daily user-repo-action aggregate backfilled from GitHub Archive BigQuery tables. This is the only dbt source used by production dashboard marts; raw reference models document the upstream shape but are not the operational upstream for metrics_* models.
        columns:
          - name: user_id
            tests:
              - not_null
          - name: repo_id
            tests:
              - not_null
          - name: action
            tests:
              - not_null
          - name: event_count
            tests:
              - not_null
          - name: activity_date
            tests:
              - not_null
